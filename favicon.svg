<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo oscuro redondeado -->
  <rect width="64" height="64" rx="12" fill="#111111"/>

  <!-- Bloque blanco izquierdo -->
  <rect x="5" y="22" width="14" height="10" rx="2.5" fill="#ffffff"/>

  <!-- Flecha blanca hacia el nodo -->
  <polygon points="19,27 25,22 25,32" fill="#ffffff"/>

  <!-- Nodo azul superior -->
  <circle cx="32" cy="20" r="7" fill="#29B6F6"/>

  <!-- Nodo azul inferior -->
  <circle cx="32" cy="44" r="7" fill="#1565C0"/>

  <!-- Línea vertical entre nodos azules -->
  <line x1="32" y1="27" x2="32" y2="37" stroke="#29B6F6" stroke-width="2.5"/>

  <!-- Flecha azul desde nodo hacia bloque derecho -->
  <polygon points="39,27 45,22 45,32" fill="#29B6F6"/>

  <!-- Bloque blanco derecho -->
  <rect x="45" y="22" width="14" height="10" rx="2.5" fill="#ffffff"/>
</svg>
