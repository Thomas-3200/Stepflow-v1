<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEPFlow — Tu portal</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:    #2563eb;
      --dark:     #0f172a;
      --gray-900: #1e293b;
      --gray-700: #334155;
      --gray-500: #64748b;
      --gray-300: #cbd5e1;
      --gray-100: #f1f5f9;
      --white:    #ffffff;
      --success:  #16a34a;
      --warning:  #d97706;
      --danger:   #dc2626;
      --font:     'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--dark); padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.2px; }
    .header-logo span { color: var(--brand); }
    .header-tag {
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      background: rgba(37,99,235,.2); color: #93c5fd;
      border-radius: 20px; letter-spacing: .3px;
    }
    .header-wa {
      font-size: 12px; font-weight: 600; color: #25d366;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
    }
    .header-wa:hover { opacity: .8; }

    /* MAIN */
    .main { max-width: 960px; margin: 0 auto; padding: 36px 20px 80px; }

    /* WELCOME BAR */
    .welcome {
      background: var(--white); border-radius: 14px; padding: 22px 24px;
      margin-bottom: 24px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .welcome-left h1 { font-size: 20px; font-weight: 800; color: var(--dark); }
    .welcome-left p { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .badge-plan {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      background: rgba(37,99,235,.1); color: var(--brand); white-space: nowrap;
    }

    /* STATUS STEPS */
    .steps-card {
      background: var(--white); border-radius: 14px; padding: 22px 24px;
      margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .steps-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--gray-500); margin-bottom: 16px; }
    .steps { display: flex; gap: 0; }
    .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px; left: 50%; width: 100%; height: 2px;
      background: var(--gray-100); z-index: 0;
    }
    .step.done:not(:last-child)::after { background: var(--success); }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; margin-bottom: 8px;
      background: var(--gray-100); color: var(--gray-300);
    }
    .step.done .step-dot { background: var(--success); color: #fff; }
    .step.active .step-dot { background: var(--brand); color: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,.15); }
    .step-label { font-size: 11px; font-weight: 600; text-align: center; color: var(--gray-500); line-height: 1.3; }
    .step.done .step-label { color: var(--success); }
    .step.active .step-label { color: var(--brand); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }

    /* KPI CARDS */
    .kpi {
      background: var(--white); border-radius: 14px; padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-500); margin-bottom: 8px; }
    .kpi-value { font-size: 32px; font-weight: 800; color: var(--dark); line-height: 1; }
    .kpi-sub { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
    .kpi-value.green { color: var(--success); }
    .kpi-value.blue { color: var(--brand); }

    /* SECTION CARD */
    .section-card {
      background: var(--white); border-radius: 14px; padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 20px;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title { font-size: 13px; font-weight: 700; color: var(--gray-900); }
    .section-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; background: var(--gray-100); color: var(--gray-500);
    }
    .section-badge.green { background: rgba(22,163,74,.1); color: var(--success); }

    /* LEADS TABLE */
    .leads-table { width: 100%; border-collapse: collapse; }
    .leads-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--gray-100); }
    .leads-table td { font-size: 13px; padding: 11px 10px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: middle; }
    .leads-table tr:last-child td { border-bottom: none; }
    .leads-table tr:hover td { background: var(--gray-100); }

    .estado-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .estado-nuevo      { background: rgba(100,116,139,.1); color: var(--gray-500); }
    .estado-contactado { background: rgba(37,99,235,.1);   color: var(--brand); }
    .estado-interesado { background: rgba(217,119,6,.1);   color: var(--warning); }
    .estado-caliente   { background: rgba(220,38,38,.1);   color: var(--danger); }
    .estado-perdido    { background: rgba(100,116,139,.08); color: var(--gray-300); }

    /* NEXT STEPS */
    .next-steps { display: flex; flex-direction: column; gap: 10px; }
    .next-step {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; border-radius: 10px;
      background: var(--gray-100); border-left: 3px solid var(--gray-300);
    }
    .next-step.active { background: rgba(37,99,235,.05); border-color: var(--brand); }
    .next-step.done { background: rgba(22,163,74,.05); border-color: var(--success); }
    .next-step-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .next-step-text h3 { font-size: 13px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; }
    .next-step-text p { font-size: 12px; color: var(--gray-500); line-height: 1.5; }

    /* CONTACT */
    .contact-box {
      background: linear-gradient(135deg, #1e3a5f, #1e293b);
      border-radius: 14px; padding: 24px; text-align: center; color: #fff;
    }
    .contact-box h3 { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .contact-box p { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 18px; }
    .contact-wa {
      display: inline-flex; align-items: center; gap: 8px;
      background: #25d366; color: #fff; padding: 12px 24px;
      border-radius: 10px; font-size: 14px; font-weight: 700;
      text-decoration: none; transition: opacity .15s;
    }
    .contact-wa:hover { opacity: .88; }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 32px; color: var(--gray-500); font-size: 13px; }
    .loading { text-align: center; padding: 60px; color: var(--gray-500); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--gray-100);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 80px 24px; }
    .not-found h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: var(--gray-500); }

    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .steps { flex-direction: column; gap: 8px; }
      .step::after { display: none; }
      .step { flex-direction: row; align-items: center; gap: 10px; }
      .step-dot { margin-bottom: 0; flex-shrink: 0; }
      .welcome { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

    <div class="header-tag">Portal del cliente</div>

  <script>
    const SB_URL = 'https://frurqigartxzikptdrpx.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZydXJxaWdhcnR4emlrcHRkcnB4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDA3MTc4MSwiZXhwIjoyMDg5NjQ3NzgxfQ.fPJ0pRc2u0f-oeynRF_fTP2XCxoldg6gzTPUofVVdMQ';

    const ESTADO_COLORS = {
      nuevo: 'nuevo', contactado: 'contactado',
      interesado: 'interesado', caliente: 'caliente', perdido: 'perdido'
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '—';
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60)   return 'hace un momento';
      if (diff < 3600) return `hace ${Math.floor(diff/60)}min`;
      if (diff < 86400)return `hace ${Math.floor(diff/3600)}h`;
      return `hace ${Math.floor(diff/86400)} días`;
    }

    function getStepStatus(customer) {
      const ob = customer.estado_onboarding || 'pendiente';
      const steps = [
        { label: 'Pago\nconfirmado', done: customer.pago_confirmado },
        { label: 'Bienvenida\nrecibida',  done: customer.bienvenida_enviada },
        { label: 'Sistema\nconfigurado',  done: ob === 'configurado' || ob === 'activo' },
        { label: 'Strategy\nCall',        done: customer.call_agendada },
        { label: 'Bot\nactivo',           done: ob === 'activo' }
      ];
      return steps;
    }

    function renderEstado(estado) {
      const cls = ESTADO_COLORS[estado] || 'nuevo';
      const labels = { nuevo:'Nuevo', contactado:'Contactado', interesado:'Interesado', caliente:'🔥 Caliente', perdido:'Perdido' };
      return `<span class="estado-pill estado-${cls}">${labels[estado] || estado}</span>`;
    }

    function render(customer, leads) {
      const app = document.getElementById('app');
      const totalLeads   = leads.length;
      const respondieron = leads.filter(l => l.estado !== 'nuevo').length;
      const calientes    = leads.filter(l => l.estado === 'caliente' || l.estado === 'interesado').length;
      const steps        = getStepStatus(customer);
      const activeIdx    = steps.findIndex(s => !s.done);

      const stepsHTML = steps.map((s, i) => {
        const cls = s.done ? 'done' : (i === activeIdx ? 'active' : '');
        const icon = s.done ? '✓' : (i === activeIdx ? '→' : (i + 1));
        return `
          <div class="step ${cls}">
            <div class="step-dot">${icon}</div>
            <div class="step-label">${s.label.replace('\n','<br>')}</div>

                  <td>${l.nombre || l.empresa || '—'}</td>
                  <td>${l.canal || 'WA'}</td>
                  <td>${renderEstado(l.estado)}</td>

            </div>
          </div>
          <div class="next-step ${customer.call_agendada ? 'done' : ''}">
            <div class="next-step-icon">${customer.call_agendada ? '✅' : '📅'}</div>
            <div class="next-step-text">
              <h3>Strategy Call</h3>
              <p>${customer.call_agendada ? 'Llamada agendada.' : 'Agendamos una llamada de 30 min para configurar tu sistema a medida.'}</p>
            </div>
          </div>
          <div class="next-step ${customer.estado_onboarding === 'activo' ? 'done' : ''}">
            <div class="next-step-icon">${customer.estado_onboarding === 'activo' ? '✅' : '🤖'}</div>

              <h3>Bot activo y enviando mensajes</h3>
              <p>${customer.estado_onboarding === 'activo' ? 'Tu sistema está 100% operativo.' : 'En menos de 48hs de la llamada tu sistema está funcionando.'}</p>
            </div>
          </div>

          </div>
          <div class="kpi">

            <div class="kpi-value green">${calientes}</div>
            <div class="kpi-sub">calientes o interesados</div>
          </div>
        </div>

        <!-- LEADS -->

          <div class="section-card">
            <div class="section-header">
              <div class="section-title">Últimas conversaciones</div>
              <div class="section-badge ${totalLeads > 0 ? 'green' : ''}">${totalLeads} leads</div>
            </div>
            ${leadsHTML}

          <!-- NEXT STEPS -->

          <a class="contact-wa" href="https://wa.me/5491158393352?text=${encodeURIComponent('Hola! Soy ' + customer.nombre + ' de ' + customer.empresa + '. Tengo una consulta sobre mi plan.')}" target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Hablar con mi asesor
          </a>
        </div>
      `;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const slug   = params.get('slug');
      const ref    = params.get('ref'); // viene de MP después del pago

      // Pantalla de confirmación de pago (viene de MP sin slug)
      if (ref && !slug) {
        const planLabels = {
          'plan-starter': 'Starter', 'plan-pro': 'Pro', 'plan-agencia': 'Agencia'
        };
        const plan = planLabels[ref] || 'STEPFlow';
        document.getElementById('app').innerHTML = `
          <div style="max-width:480px;margin:60px auto;text-align:center;padding:0 20px;">
            <div style="font-size:56px;margin-bottom:16px;">🎉</div>
            <h2 style="font-size:24px;font-weight:800;color:#0f172a;margin-bottom:10px;">¡Pago confirmado!</h2>
            <p style="font-size:14px;color:#64748b;line-height:1.7;margin-bottom:28px;">
              Tu suscripción al plan <strong>${plan}</strong> fue procesada con éxito.<br>
              En las próximas horas recibís un mensaje por WhatsApp con el acceso a tu portal personalizado y los próximos pasos.
            </p>
            <div style="background:#f1f5f9;border-radius:12px;padding:20px;margin-bottom:24px;text-align:left;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:12px;">¿Qué pasa ahora?</div>
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;gap:10px;font-size:13px;color:#334155;">
                  <span>⏱️</span><span>En las próximas 2 horas te escribimos por WhatsApp</span>
                </div>
                <div style="display:flex;gap:10px;font-size:13px;color:#334155;">
                  <span>📅</span><span>Agendamos tu Strategy Call para configurar el sistema</span>
                </div>

      if (!slug) {
        document.getElementById('app').innerHTML = `
          <div class="not-found">
            <h2>Enlace inválido</h2>
            <p>Este portal requiere un enlace personalizado. Revisá el mensaje que te enviamos por WhatsApp.</p>
          </div>`;
        return;
      }

      const headers = {
        'Authorization': `Bearer ${SB_KEY}`,
        'apikey': SB_KEY
      };

      try {
        // Fetch customer
        const cRes  = await fetch(`${SB_URL}/rest/v1/customers?portal_slug=eq.${slug}&limit=1`, { headers });
        const cData = await cRes.json();

        if (!cData || cData.length === 0) {
          document.getElementById('app').innerHTML = `
            <div class="not-found">
              <h2>Portal no encontrado</h2>
              <p>No encontramos tu cuenta. Revisá el enlace o escribinos por WhatsApp.</p>
            </div>`;
          return;
        }

        const customer = cData[0];

        // Fetch leads by empresa (approximate match by nicho)
        const lRes  = await fetch(`${SB_URL}/rest/v1/leads?nicho=eq.${encodeURIComponent(customer.nicho || '')}&order=created_at.desc&limit=10`, { headers });
        const leads = await lRes.json();

        render(customer, Array.isArray(leads) ? leads : []);

      } catch (e) {
        document.getElementById('app').innerHTML = `
          <div class="not-found">
            <h2>Error al cargar</h2>
            <p>Hubo un problema. Intentá recargar la página o escribinos por WhatsApp.</p>
          </div>`;
      }
    }

    init();
  </script>
